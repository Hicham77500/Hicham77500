name: Update "Currently building"

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"  # toutes les 6h
  push:
    branches: ["main", "master"]

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch latest pushed repo and update README
        env:
          USERNAME: Hicham77500
        run: |
          set -e

          API="https://api.github.com/users/${USERNAME}/repos?sort=pushed&per_page=1"
          JSON=$(curl -sL "$API")

          NAME=$(echo "$JSON" | jq -r '.[0].name // empty')
          URL=$(echo "$JSON"  | jq -r '.[0].html_url // empty')
          DESC=$(echo "$JSON" | jq -r '.[0].description // empty')

          if [ -z "$NAME" ] || [ -z "$URL" ]; then
            echo "Impossible de récupérer le repo le plus récent."
            exit 0
          fi

          if [ -z "$DESC" ] || [ "$DESC" = "null" ]; then
            DESC="(no description)"
          fi

          NEW_LINE="🚧 **Currently building:** [\`${NAME}\`](${URL}) — ${DESC}"

          # Remplace le contenu entre NOW:START et NOW:END
          perl -0777 -i -pe "s/<!-- NOW:START -->.*?<!-- NOW:END -->/<!-- NOW:START -->\n${NEW_LINE}\n<!-- NOW:END -->/s" README.md

      - name: Commit changes (if any)
        run: |
          if git diff --quiet; then
            echo "No changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "chore: update currently building"
          git push
