name: Update "Currently building"

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *" # toutes les 6h
  push:
    branches: ["main"]

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Fetch latest pushed repo and update README
        env:
          USERNAME: Hicham77500
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          API="https://api.github.com/users/${USERNAME}/repos?sort=pushed&per_page=1"

          # Auth => évite le rate-limit, et rend l'appel plus stable
          JSON=$(curl -sL \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "$API")

          NAME=$(echo "$JSON" | jq -r '.[0].name // empty')
          URL=$(echo "$JSON"  | jq -r '.[0].html_url // empty')
          DESC=$(echo "$JSON" | jq -r '.[0].description // empty')

          if [ -z "$NAME" ] || [ -z "$URL" ]; then
            echo "Impossible de récupérer le repo le plus récent."
            exit 0
          fi

          if [ -z "$DESC" ] || [ "$DESC" = "null" ]; then
            DESC="(no description)"
          fi

          # Nettoie un peu la description (évite retours à la ligne)
          DESC=$(echo "$DESC" | tr '\n' ' ')

          NEW_LINE="🚧 **Currently building:** [\`${NAME}\`](${URL}) — ${DESC}"

          # Remplace le contenu entre NOW:START et NOW:END
          # (conserve les tags et remplace juste ce qu'il y a au milieu)
          awk -v newline="$NEW_LINE" '
            BEGIN {inblock=0}
            /<!-- NOW:START -->/ {print; print newline; inblock=1; next}
            /<!-- NOW:END -->/   {inblock=0; print; next}
            inblock==0 {print}
          ' README.md > README.tmp && mv README.tmp README.md

      - name: Commit changes (if any)
        run: |
          if git diff --quiet; then
            echo "No changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "chore: update currently building"
          git push
